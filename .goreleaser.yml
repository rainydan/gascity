version: 2

builds:
  - main: ./cmd/gc
    binary: gc
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]

release:
  prerelease: auto
  replace_existing_artifacts: true

homebrew_casks:
  - repository:
      owner: gastownhall
      name: homebrew-gascity
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    binaries:
      - gc
    homepage: https://github.com/gastownhall/gascity
    description: "Gas City CLI — an orchestration-builder SDK for multi-agent coding workflows"
    url:
      verified: github.com/gastownhall/gascity/
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/gc"]
          end

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
