version: 2

builds:
  - main: ./cmd/gc
    binary: gc
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Tag }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]

release:
  prerelease: auto
  replace_existing_artifacts: true

brews:
  - repository:
      owner: gastownhall
      name: homebrew-gascity
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/gastownhall/gascity
    description: "Gas City CLI — an orchestration-builder SDK for multi-agent coding workflows"
    license: "MIT"
    dependencies:
      - name: tmux
      - name: jq
      - name: git
      - name: dolt
      - name: flock
      - name: beads
    install: |
      bin.install "gc"
    caveats: |
      Dependencies (tmux, jq, git, dolt, flock) are installed automatically.

      Get started:
        gc init <city-path>      # create a new city
        gc start <city-path>     # start an existing city
    test: |
      assert_match version.to_s, shell_output("#{bin}/gc version")

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: "Features"
      regexp: '^.*feat(\(\w+\))?:.*$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*fix(\(\w+\))?:.*$'
      order: 1
    - title: "Others"
      order: 999
