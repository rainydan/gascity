# gc-import — legacy compatibility pack for older package-manager experiments.
#
# Built-in `gc import` in the Go CLI is authoritative. This pack remains
# in-tree only so older bootstrap/cache experiments still have a fixture.
#
# Commands and the doctor check are convention-discovered from
# commands/<name>/ and doctor/<name>/ directories. Each command's
# command.toml sidecar points at the Python entrypoint; the python3.11
# doctor check uses run.sh per V2 convention.

[pack]
name = "import"
version = "0.2.0"
schema = 2
description = "Legacy compatibility pack for older gc import experiments; built-in Go gc import is authoritative"
